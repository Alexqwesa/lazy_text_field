name: lazy_text_field_demo

on:
  push:
    branches: [main, master]
    paths:
      - 'example/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/lazy_text_field_demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lazy_text_field_demo_pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure GitHub Pages
        if: env.PAGES_TOKEN == ''
        uses: actions/configure-pages@v6

      - name: Enable and configure GitHub Pages
        if: env.PAGES_TOKEN != ''
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_TOKEN }}

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Test example
        working-directory: example
        run: flutter test

      - name: Build web demo
        working-directory: example
        run: flutter build web --release --base-href /lazy_text_field/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: example/build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
